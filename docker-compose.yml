# docker-compose.yml
version: "3.9"

services:
  app:
    build: .
    image: resumetailor
    ports:
      - "8000:8000"
    volumes:
      - resumedb-data:/app/db
      - resumepdf-data:/app/pdfs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  resumedb-data:
  resumepdf-data:
